<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromptPilot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      background: #0c0a09;
      color: #d6d3d1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid #292524;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: #f5f5f4;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #0c0a09;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 700;
      color: #f5f5f4;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      background: #1c1917;
      padding: 4px 8px;
      border-radius: 20px;
      border: 1px solid #292524;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: #78716c;
      border-radius: 50%;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #57534e;
      margin-bottom: 8px;
    }

    .mode-select {
      width: 100%;
      background: #1c1917;
      border: 1px solid #292524;
      color: #d6d3d1;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 14px;
      outline: none;
    }

    .usage-card {
      background: #1c1917;
      border: 1px solid #292524;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .usage-label {
      font-size: 11px;
      color: #78716c;
    }

    .usage-count {
      font-size: 18px;
      font-weight: 700;
      color: #f5f5f4;
    }

    .dashboard-btn {
      display: block;
      width: 100%;
      text-align: center;
      background: #f5f5f4;
      color: #0c0a09;
      border-radius: 8px;
      padding: 9px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="brand">
      <div class="logo">✦</div>
      <h1>PromptPilot</h1>
    </div>
    <div class="status-badge">
      <div id="status-dot" class="status-dot"></div>
      <span id="status-text">Checking...</span>
    </div>
  </div>

  <div class="section-label">Prompt Mode</div>
  <select id="mode" class="mode-select">
    <option value="professional">Professional</option>
    <option value="concise">Concise</option>
    <option value="friendly">Friendly</option>
    <option value="creative">Creative</option>
  </select>

  <div class="usage-card">
    <div>
      <div class="usage-label">Daily Usage</div>
      <div class="usage-count" id="usage-count">—</div>
    </div>
    <div style="font-size: 22px; opacity: 0.3;">⚡</div>
  </div>

  <a href="#" id="go-dashboard" class="dashboard-btn" target="_blank">
    Sign In / Dashboard →
  </a>

  <script src="popup.js"></script>
</body>

</html>
